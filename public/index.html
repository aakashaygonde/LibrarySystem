<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="toast-container"></div>

<nav>
  <div class="nav-content">
    <h2><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-book"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg> Library System</h2>
    <div id="nav-links" style="display: none;">
      <button class="nav-btn" onclick="navigate('books-view')">Dashboard</button>
      <button class="nav-btn" onclick="navigate('profile-view')" id="nav-profile">Profile</button>
      <button class="nav-btn" onclick="navigate('staff-view')" id="nav-staff" style="display: none;">Staff Panel</button>
      <button class="nav-btn danger" onclick="logout()">Logout</button>
    </div>
  </div>
</nav>

<div class="main-container">

  <!-- AUTH VIEW -->
  <div id="auth-view" class="view active">
    <div class="card auth-card">
      <div class="auth-tabs">
        <button class="tab active" onclick="toggleAuth('login')">Login</button>
        <button class="tab" onclick="toggleAuth('register')">Register</button>
      </div>

      <div id="login-form">
        <input id="login-email" type="email" placeholder="Email">
        <input id="login-password" type="password" placeholder="Password">
        <button class="primary-btn w-full mt-4" onclick="login()">Login</button>
      </div>

      <div id="register-form" style="display: none;">
        <input id="reg-name" type="text" placeholder="Full Name">
        <input id="reg-email" type="email" placeholder="Email">
        <input id="reg-password" type="password" placeholder="Password">
        <select id="reg-role">
          <option value="customer">Customer</option>
          <option value="staff">Staff</option>
        </select>
        <button class="primary-btn w-full mt-4" onclick="register()">Register</button>
      </div>
    </div>
  </div>

  <!-- BOOKS VIEW -->
  <div id="books-view" class="view">
    <div class="view-header">
      <h3>Available Books</h3>
      <div class="search-bar">
        <input id="search-input" type="text" placeholder="Search books..." onkeyup="searchBooks()">
      </div>
    </div>
    <div class="grid-container" id="books-list">
      <!-- Books will load here -->
    </div>
  </div>

  <!-- PROFILE VIEW -->
  <div id="profile-view" class="view">
    <div class="view-header">
      <h3>My Profile & Activity</h3>
    </div>
    
    <div class="card" style="margin-bottom: 2rem;">
      <h4 style="margin-top: 0; margin-bottom: 1rem;">Profile Information</h4>
      <p style="margin: 0.5rem 0; color: var(--text-muted);"><strong>Name:</strong> <span id="profile-name" style="color: var(--text-main);"></span></p>
      <p style="margin: 0.5rem 0; color: var(--text-muted);"><strong>Email:</strong> <span id="profile-email" style="color: var(--text-main);"></span></p>
      <p style="margin: 0.5rem 0; color: var(--text-muted);"><strong>Role:</strong> <span id="profile-role" style="text-transform: capitalize; color: var(--text-main);"></span></p>
    </div>
    <div class="card">
      <table class="data-table">
        <thead>
          <tr>
            <th>Book ID</th>
            <th>Issue Date</th>
            <th>Return Date</th>
            <th>Fine</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="profile-issues">
        </tbody>
      </table>
    </div>
  </div>

  <!-- STAFF VIEW -->
  <div id="staff-view" class="view">
    <div class="view-header">
      <h3>Staff Dashboard</h3>
    </div>
    <div class="staff-grid">
      <div class="card">
        <h4>Add New Book</h4>
        <input id="add-title" placeholder="Book Title" required>
        <input id="add-author" placeholder="Author" required>
        <input id="add-quantity" type="number" min="1" placeholder="Quantity" value="1" required>
        <button class="primary-btn" onclick="addBook()">Add Book</button>
      </div>
      <div class="card">
        <h4>Manage Books</h4>
        <ul class="admin-list" id="admin-books-list"></ul>
      </div>
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
